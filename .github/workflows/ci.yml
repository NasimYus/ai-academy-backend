name: backend ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: aiacademy
          POSTGRES_PASSWORD: aiacademy
          POSTGRES_DB: aiacademy
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aiacademy"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://aiacademy:aiacademy@localhost:5432/aiacademy

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: uv sync --dev
      - name: Lint (ruff)
        run: uv run ruff check
      - name: Tests (pytest)
        run: uv run pytest -q
