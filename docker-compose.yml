services:
  db:
    image: postgres:16
    container_name: aiacademy_db
    environment:
      POSTGRES_USER: aiacademy
      POSTGRES_PASSWORD: aiacademy
      POSTGRES_DB: aiacademy
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiacademy"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
